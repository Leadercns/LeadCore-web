<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>欢迎访问</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-body: #eef2f7;
            --bg-card: rgba(255, 255, 255, 0.55);
            --bg-card-hover: rgba(255, 255, 255, 0.75);
            --bg-drawer: rgba(255, 255, 255, 0.78);
            --bg-overlay: rgba(0, 0, 0, 0.25);
            --text-primary: #1f2e42;
            --text-secondary: #3d5470;
            --text-muted: #6a7f9a;
            --border-soft: rgba(60, 100, 140, 0.18);
            --shadow-card: 0 8px 32px rgba(40, 80, 120, 0.08), 0 2px 8px rgba(40, 80, 120, 0.04);
            --shadow-drawer: 2px 0 40px rgba(40, 80, 120, 0.1);
            --accent: #3a7bad;
            --accent-soft: rgba(58, 123, 173, 0.12);
            --header-bg: rgba(238, 242, 247, 0.7);
            --radius-md: 16px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --blur-amount: 18px;
            --particle-color: rgba(60, 100, 140, 0.5);
            --line-color: rgba(60, 100, 140, 0.12);
            --glow-color: rgba(60, 120, 180, 0.06);
        }

        .dark {
            --bg-body: #0b1018;
            --bg-card: rgba(26, 40, 60, 0.55);
            --bg-card-hover: rgba(38, 56, 80, 0.7);
            --bg-drawer: rgba(18, 28, 42, 0.82);
            --bg-overlay: rgba(0, 0, 0, 0.5);
            --text-primary: #e4eaf2;
            --text-secondary: #b0c4dd;
            --text-muted: #7a8fa8;
            --border-soft: rgba(120, 170, 220, 0.15);
            --shadow-card: 0 8px 32px rgba(0, 0, 0, 0.3), 0 2px 8px rgba(0, 0, 0, 0.15);
            --shadow-drawer: 2px 0 40px rgba(0, 0, 0, 0.4);
            --accent: #6a9fd8;
            --accent-soft: rgba(106, 159, 216, 0.15);
            --header-bg: rgba(11, 16, 24, 0.7);
            --particle-color: rgba(160, 190, 220, 0.5);
            --line-color: rgba(160, 190, 220, 0.10);
            --glow-color: rgba(100, 160, 220, 0.06);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--bg-body);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background var(--transition), color var(--transition);
            padding: 0;
            margin: 0;
            overflow-x: hidden;
        }

        #bgCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .app-header {
            position: sticky;
            top: 0;
            z-index: 40;
            background: var(--header-bg);
            backdrop-filter: blur(var(--blur-amount));
            -webkit-backdrop-filter: blur(var(--blur-amount));
            padding: 0.8rem 1.2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-soft);
            transition: background var(--transition), border var(--transition);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .menu-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-primary);
            padding: 0.2rem 0.4rem;
            line-height: 1;
            transition: transform 0.15s;
            font-family: inherit;
            opacity: 0.7;
        }

        .menu-btn:hover {
            transform: scale(1.1);
            opacity: 1;
        }

        .header-title {
            font-weight: 500;
            font-size: 1.1rem;
            letter-spacing: 0.3px;
            color: var(--text-primary);
            opacity: 0.8;
        }

        .theme-toggle {
            background: var(--bg-card);
            border: 1px solid var(--border-soft);
            border-radius: 40px;
            width: 60px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 6px;
            cursor: pointer;
            position: relative;
            transition: background var(--transition), border var(--transition);
            flex-shrink: 0;
            user-select: none;
            backdrop-filter: blur(6px);
        }

        .theme-toggle .thumb {
            width: 22px;
            height: 22px;
            background: var(--text-primary);
            border-radius: 50%;
            position: absolute;
            top: 3px;
            left: 3px;
            transition: transform var(--transition), background var(--transition);
            box-shadow: 0 1px 6px rgba(0, 0, 0, 0.1);
            opacity: 0.7;
        }

        .dark .theme-toggle .thumb {
            transform: translateX(26px);
            background: #f0c060;
            opacity: 0.9;
        }

        .theme-toggle .label {
            font-size: 0.75rem;
            font-weight: 400;
            color: var(--text-muted);
            z-index: 1;
            pointer-events: none;
            line-height: 1;
            opacity: 0.6;
        }

        .drawer-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg-overlay);
            z-index: 50;
            opacity: 0;
            visibility: hidden;
            transition: opacity var(--transition), visibility var(--transition);
            backdrop-filter: blur(4px);
        }

        .drawer-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .drawer {
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            width: 280px;
            max-width: 80vw;
            background: var(--bg-drawer);
            backdrop-filter: blur(var(--blur-amount));
            -webkit-backdrop-filter: blur(var(--blur-amount));
            z-index: 60;
            transform: translateX(-100%);
            transition: transform var(--transition);
            padding: 2rem 1.6rem;
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow-drawer);
            border-right: 1px solid var(--border-soft);
            overflow-y: auto;
        }

        .drawer.open {
            transform: translateX(0);
        }

        .drawer-close {
            align-self: flex-end;
            background: none;
            border: none;
            font-size: 1.6rem;
            cursor: pointer;
            color: var(--text-secondary);
            padding: 0.2rem 0.4rem;
            margin-bottom: 1.2rem;
            line-height: 1;
            font-family: inherit;
            transition: transform 0.15s;
            opacity: 0.6;
        }

        .drawer-close:hover {
            transform: rotate(90deg);
            opacity: 1;
        }

        .drawer-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            overflow: hidden;
            background: var(--bg-card);
            border: 2px solid var(--border-soft);
            margin-bottom: 0.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            backdrop-filter: blur(4px);
        }

        .drawer-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .drawer-avatar .fallback {
            font-size: 2.2rem;
            font-weight: 400;
            color: var(--text-secondary);
        }

        .drawer h2 {
            font-size: 1.4rem;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 0.1rem;
            letter-spacing: 0.5px;
        }

        .drawer .sub {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 1.2rem;
            font-weight: 400;
        }

        .drawer .desc {
            color: var(--text-secondary);
            font-size: 0.92rem;
            line-height: 1.7;
            border-top: 1px solid var(--border-soft);
            padding-top: 1.2rem;
            margin-top: 0.2rem;
            font-weight: 400;
        }

        .drawer .nav-links {
            margin-top: 1.6rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .drawer .nav-btn {
            display: block;
            width: 100%;
            text-align: center;
            color: var(--text-primary);
            text-decoration: none;
            padding: 0.6rem 0.8rem;
            border-radius: 12px;
            font-weight: 450;
            font-size: 0.98rem;
            background: var(--bg-card);
            backdrop-filter: blur(6px);
            border: 1px solid var(--border-soft);
            transition: background 0.2s, box-shadow 0.2s, transform 0.15s;
            cursor: pointer;
            opacity: 0.85;
            letter-spacing: 0.3px;
        }

        .drawer .nav-btn:hover {
            background: var(--bg-card-hover);
            box-shadow: var(--shadow-card), 0 0 30px var(--glow-color);
            transform: translateY(-1px);
            opacity: 1;
        }

        .drawer .nav-btn:active {
            transform: scale(0.97);
        }

        .drawer .drawer-footer {
            margin-top: auto;
            padding-top: 1.6rem;
            font-size: 0.75rem;
            color: var(--text-muted);
            border-top: 1px solid var(--border-soft);
            opacity: 0.6;
        }

        .main-content {
            flex: 1;
            max-width: 680px;
            width: 100%;
            margin: 0 auto;
            padding: 1.6rem 1.2rem 3rem;
            display: flex;
            flex-direction: column;
            gap: 1.6rem;
            position: relative;
            z-index: 1;
        }

        .card {
            background: var(--bg-card);
            backdrop-filter: blur(var(--blur-amount));
            -webkit-backdrop-filter: blur(var(--blur-amount));
            border-radius: var(--radius-md);
            padding: 1.4rem 1.6rem;
            box-shadow: var(--shadow-card);
            border: 1px solid var(--border-soft);
            transition: background var(--transition), border var(--transition), box-shadow var(--transition), transform 0.2s;
        }

        .card:hover {
            background: var(--bg-card-hover);
            box-shadow: var(--shadow-card), 0 0 40px var(--glow-color);
            transform: translateY(-1px);
        }

        .profile-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 0.2rem 0;
        }

        .avatar {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            overflow: hidden;
            flex-shrink: 0;
            border: 2px solid var(--border-soft);
            margin-bottom: 0.6rem;
            background: var(--bg-card);
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .avatar .fallback {
            font-size: 2.2rem;
            font-weight: 400;
            color: var(--text-secondary);
            user-select: none;
        }

        .profile-header .name-title h1 {
            color: var(--text-primary);
            font-weight: 500;
            font-size: 1.8rem;
            letter-spacing: 0.5px;
            opacity: 0.9;
        }

        .profile-header .name-title .title-role {
            color: var(--text-secondary);
            font-size: 0.95rem;
            font-weight: 400;
            opacity: 0.7;
        }

        .bio-text {
            text-align: center;
        }

        .bio-text p {
            font-size: 1rem;
            color: var(--text-secondary);
            margin-bottom: 0.8rem;
            font-weight: 400;
            opacity: 0.8;
        }

        .bio-text p:last-child {
            margin-bottom: 0;
        }

        .skills-section {
            text-align: center;
        }

        .skills-section h3 {
            font-size: 0.7rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            margin-bottom: 0.8rem;
            opacity: 0.5;
        }

        .skill-tags {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.5rem;
        }

        .skill-tag {
            background: var(--bg-card);
            color: var(--text-secondary);
            padding: 0.2rem 1rem;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 400;
            border: 1px solid var(--border-soft);
            transition: background 0.2s, color 0.2s;
            backdrop-filter: blur(4px);
        }

        .skill-tag:hover {
            background: var(--bg-card-hover);
            color: var(--text-primary);
        }

        .projects-section h3 {
            font-size: 0.7rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            margin-bottom: 0.8rem;
            text-align: center;
            opacity: 0.5;
        }

        .project-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .project-item {
            background: var(--bg-card);
            border: 1px solid var(--border-soft);
            border-radius: 12px;
            padding: 0.7rem 1.2rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            transition: box-shadow 0.2s, transform 0.15s, background 0.2s;
            cursor: pointer;
            position: relative;
            z-index: 2;
            backdrop-filter: blur(4px);
        }

        .project-item:hover {
            box-shadow: 0 4px 20px rgba(40, 80, 120, 0.06), 0 0 30px var(--glow-color);
            transform: translateY(-1px);
            background: var(--bg-card-hover);
        }

        .dark .project-item:hover {
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2), 0 0 30px var(--glow-color);
        }

        .project-name {
            font-weight: 500;
            color: var(--text-primary);
            font-size: 1rem;
            letter-spacing: -0.1px;
            pointer-events: none;
            opacity: 0.85;
        }

        .project-note {
            color: var(--text-muted);
            font-size: 0.8rem;
            font-weight: 400;
            pointer-events: none;
            text-align: right;
            opacity: 0.6;
        }

        .loading,
        .error {
            text-align: center;
            color: var(--text-muted);
            padding: 0.5rem 0;
            font-weight: 400;
            opacity: 0.6;
        }

        .error {
            color: #c0395a;
            opacity: 0.8;
        }

        .profile-footer {
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-secondary);
            padding: 0.5rem 0.8rem;
            border-top: none;
            background: var(--bg-card);
            backdrop-filter: blur(var(--blur-amount));
            -webkit-backdrop-filter: blur(var(--blur-amount));
            border-radius: 12px;
            border: 1px solid var(--border-soft);
            font-weight: 400;
            margin-top: 0.5rem;
            margin-bottom: 0.5rem;
            opacity: 0.7;
        }

        .profile-footer a {
            text-decoration: none;
            color: var(--accent);
            transition: color 0.2s;
        }

        .profile-footer a:hover {
            color: var(--text-primary);
        }

        @media (max-width: 600px) {
            .main-content {
                padding: 1rem 0.8rem 2rem;
                gap: 1.2rem;
            }
            .card {
                padding: 1.2rem 1rem;
                border-radius: 14px;
            }
            .drawer {
                width: 260px;
                padding: 1.6rem 1.2rem;
            }
            .app-header {
                padding: 0.6rem 0.8rem;
            }
            .header-title {
                font-size: 0.95rem;
            }
            .project-item {
                flex-direction: column;
                align-items: stretch;
                gap: 0.3rem;
                padding: 0.7rem 1rem;
            }
            .project-name {
                text-align: center;
                font-size: 0.95rem;
            }
            .project-note {
                text-align: center;
                width: 100%;
            }
            .profile-footer {
                font-size: 0.7rem;
                padding: 0.4rem 0.6rem;
                margin-top: 1rem;
                margin-bottom: 1rem;
            }
            .avatar {
                width: 80px;
                height: 80px;
            }
            .profile-header .name-title h1 {
                font-size: 1.5rem;
            }
            .theme-toggle {
                width: 54px;
                height: 26px;
            }
            .theme-toggle .thumb {
                width: 20px;
                height: 20px;
                top: 2px;
                left: 2px;
            }
            .dark .theme-toggle .thumb {
                transform: translateX(24px);
            }
            .theme-toggle .label {
                font-size: 0.65rem;
            }
            .menu-btn {
                font-size: 1.3rem;
            }
            .drawer-close {
                font-size: 1.4rem;
            }
            .drawer .nav-btn {
                padding: 0.5rem 0.6rem;
                font-size: 0.9rem;
            }
        }

        @media (max-width: 400px) {
            .card {
                padding: 1rem 0.8rem;
            }
            .drawer-avatar {
                width: 64px;
                height: 64px;
            }
        }
    </style>
</head>
<body>

    <canvas id="bgCanvas"></canvas>

    <header class="app-header">
        <div class="header-left">
            <button class="menu-btn" id="menuToggle">☰</button>
            <span class="header-title">云雀</span>
        </div>
        <div class="theme-toggle" id="themeToggle" role="button" tabindex="0">
            <span class="label">☀</span>
            <span class="thumb"></span>
            <span class="label">☽</span>
        </div>
    </header>

    <div class="drawer-overlay" id="drawerOverlay"></div>

    <aside class="drawer" id="drawer">
        <button class="drawer-close" id="drawerClose">✕</button>
        <div class="drawer-avatar">
            <img src="/assets/gr.jpeg" alt="头像" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';" />
            <span class="fallback" style="display:none;">云</span>
        </div>
        <h2>云雀</h2>
        <div class="sub">全栈开发者 · 大学生一名</div>
        <div class="desc">
            欢迎访问我的个人网站，这里用于展示特殊项目。
        </div>
        <div class="nav-links">
            <a href="/" class="nav-btn">首页</a>
            
            <a href="https://pan.13140300.xyz" target="_blank" class="nav-btn">云盘</a>
            
        </div>
        <div class="drawer-footer">
            Copyright &copy; 云雀 2026 - 2027
        </div>
    </aside>

    <main class="main-content">

        <div class="profile-header">
            <div class="avatar">
                <img src="/assets/gr.jpeg" alt="头像" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';" />
                <span class="fallback" style="display:none;">云</span>
            </div>
            <div class="name-title">
                <h1>云雀</h1>
                <div class="title-role">全栈开发者 · 大学生一名</div>
            </div>
        </div>

        <div class="card bio-text">
            <p>
                欢迎访问我的网站，此网站用于展示特殊项目。
            </p>
        </div>

        <div class="card skills-section">
            <h3>技术栈</h3>
            <div class="skill-tags">
                <span class="skill-tag">C</span>
                <span class="skill-tag">Java</span>
                <span class="skill-tag">HTML/CSS</span>
                <span class="skill-tag">Tiecode</span>
                <span class="skill-tag">MySQL</span>
            </div>
        </div>

        <div class="card projects-section">
            <h3>项目作品</h3>
            <div id="projectContainer" class="project-list">
                <div class="loading">加载项目中...</div>
            </div>
        </div>

        <div class="profile-footer">
            Copyright &copy; 云雀 2026 - 2027<br />
            <a href="https://icp.gov.moe/?keyword=20260430" target="_blank">萌ICP备20260430号</a>
        </div>

    </main>

    <script>
        (function() {
            var container = document.getElementById('projectContainer');

            container.addEventListener('click', function(e) {
                var item = e.target.closest('.project-item');
                if (!item) return;
                var link = item.dataset.url;
                if (link && link !== '#') {
                    window.open(link, '_blank');
                }
            });

            function renderProjects(data) {
                if (!Array.isArray(data) || data.length === 0) {
                    container.innerHTML = '<div class="error">暂无项目数据</div>';
                    return;
                }
                var html = '';
                data.forEach(function(item) {
                    var name = item.name || '未命名';
                    var url = item.url || '#';
                    var note = item.remark || item.备注 || '';
                    html += '<div class="project-item" data-url="' + url + '">' +
                        '<span class="project-name">' + name + '</span>' +
                        '<span class="project-note">' + note + '</span>' +
                        '</div>';
                });
                container.innerHTML = html;
            }

            function showError(msg) {
                container.innerHTML = '<div class="error">' + msg + '</div>';
            }

            fetch('/project_list.json')
                .then(function(response) {
                    if (!response.ok) {
                        throw new Error('HTTP error! status: ' + response.status);
                    }
                    return response.json();
                })
                .then(function(data) {
                    renderProjects(data);
                })
                .catch(function(err) {
                    console.error('Fetch error:', err);
                    showError('无法加载项目列表，请稍后重试。');
                });
        })();

        (function() {
            var drawer = document.getElementById('drawer');
            var overlay = document.getElementById('drawerOverlay');
            var menuBtn = document.getElementById('menuToggle');
            var closeBtn = document.getElementById('drawerClose');

            function openDrawer() {
                drawer.classList.add('open');
                overlay.classList.add('active');
                document.body.style.overflow = 'hidden';
            }

            function closeDrawer() {
                drawer.classList.remove('open');
                overlay.classList.remove('active');
                document.body.style.overflow = '';
            }

            menuBtn.addEventListener('click', openDrawer);
            closeBtn.addEventListener('click', closeDrawer);
            overlay.addEventListener('click', closeDrawer);

            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') closeDrawer();
            });
        })();

        (function() {
            var themeToggle = document.getElementById('themeToggle');
            var prefersDark = window.matchMedia('(prefers-color-scheme: dark)');
            var currentTheme = localStorage.getItem('theme') || (prefersDark.matches ? 'dark' : 'light');

            if (currentTheme === 'dark') {
                document.documentElement.classList.add('dark');
            }

            themeToggle.addEventListener('click', function() {
                var isDark = document.documentElement.classList.toggle('dark');
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
            });
        })();

        (function() {
            var canvas = document.getElementById('bgCanvas');
            var ctx = canvas.getContext('2d');
            var w, h;

            function resize() {
                w = canvas.width = window.innerWidth;
                h = canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            var particles = [];
            var count = 70;
            var connectionDistance = 130;

            for (var i = 0; i < count; i++) {
                particles.push({
                    x: Math.random() * w,
                    y: Math.random() * h,
                    vx: (Math.random() - 0.5) * 0.8,
                    vy: (Math.random() - 0.5) * 0.8,
                    radius: 2 + Math.random() * 3
                });
            }

            var mouse = { x: w / 2, y: h / 2, active: false };
            document.addEventListener('mousemove', function(e) {
                mouse.x = e.clientX;
                mouse.y = e.clientY;
                mouse.active = true;
            });
            document.addEventListener('mouseleave', function() {
                mouse.active = false;
            });

            function getParticleColor() {
                var isDark = document.documentElement.classList.contains('dark');
                return isDark ? 'rgba(160, 190, 220, ' : 'rgba(60, 100, 140, ';
            }

            function draw() {
                ctx.clearRect(0, 0, w, h);

                var pColor = getParticleColor();

                particles.forEach(function(p) {
                    p.x += p.vx;
                    p.y += p.vy;

                    if (p.x < 0 || p.x > w) p.vx *= -1;
                    if (p.y < 0 || p.y > h) p.vy *= -1;

                    p.x = Math.max(0, Math.min(w, p.x));
                    p.y = Math.max(0, Math.min(h, p.y));

                    if (mouse.active) {
                        var dx = mouse.x - p.x;
                        var dy = mouse.y - p.y;
                        var dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 150) {
                            var force = (150 - dist) / 150 * 0.03;
                            p.vx += dx * force;
                            p.vy += dy * force;
                        }
                    }

                    p.vx += (Math.random() - 0.5) * 0.04;
                    p.vy += (Math.random() - 0.5) * 0.04;
                    var maxSpeed = 1.2;
                    var sp = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
                    if (sp > maxSpeed) {
                        p.vx = (p.vx / sp) * maxSpeed;
                        p.vy = (p.vy / sp) * maxSpeed;
                    }
                });

                for (var i = 0; i < particles.length; i++) {
                    for (var j = i + 1; j < particles.length; j++) {
                        var dx = particles[i].x - particles[j].x;
                        var dy = particles[i].y - particles[j].y;
                        var dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < connectionDistance) {
                            var alpha = 1 - (dist / connectionDistance);
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.strokeStyle = pColor + (alpha * 0.25) + ')';
                            ctx.lineWidth = 1.2;
                            ctx.stroke();
                        }
                    }
                }

                particles.forEach(function(p) {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    ctx.fillStyle = pColor + '0.7)';
                    ctx.fill();
                    ctx.shadowColor = pColor + '0.2)';
                    ctx.shadowBlur = 8;
                    ctx.fill();
                    ctx.shadowBlur = 0;
                });

                requestAnimationFrame(draw);
            }

            draw();
        })();
    </script>

</body>
</html>
