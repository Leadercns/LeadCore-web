<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LeadCore · API 对接文档</title>
    <style>
        /* ===== 全局 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html {
            -webkit-text-size-adjust: 100%;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #f6f9fc;
            color: #1e293b;
            line-height: 1.6;
            min-height: 100vh;
            touch-action: pan-y pinch-zoom;
            position: relative;
            overflow-x: hidden;
        }
        .glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            background: radial-gradient(600px circle at var(--x, 50%) var(--y, 50%), rgba(37, 99, 235, 0.07), transparent 70%);
            transition: background 0.1s;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 24px;
            position: relative;
            z-index: 1;
        }
        a {
            text-decoration: none;
            color: inherit;
        }
        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        /* ===== 导航栏 ===== */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 100;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 14px 0;
            border-bottom: 1px solid rgba(0, 0, 0, 0.04);
        }
        .navbar .container {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 20px;
            font-weight: 700;
            color: #0f172a;
            flex-shrink: 0;
        }
        .logo-icon {
            width: 34px;
            height: 34px;
            border-radius: 10px;
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 700;
            color: #fff;
            flex-shrink: 0;
            letter-spacing: -0.5px;
            box-shadow: 0 2px 12px rgba(37, 99, 235, 0.2);
        }
        .nav-links {
            display: flex;
            align-items: center;
            gap: 24px;
            list-style: none;
            font-size: 15px;
            font-weight: 500;
        }
        .nav-links a {
            color: #475569;
            transition: color 0.2s;
        }
        .nav-links a:hover {
            color: #0f172a;
        }
        .nav-links a.active {
            color: #2563eb;
            font-weight: 600;
        }
        .nav-cta {
            background: #2563eb;
            padding: 7px 22px;
            border-radius: 30px;
            color: #fff !important;
            font-weight: 600;
            font-size: 14px;
            transition: background 0.2s;
        }
        .nav-cta:hover {
            background: #1d4ed8;
            color: #fff !important;
        }
        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            padding: 4px;
            background: transparent;
            border: none;
        }
        .hamburger span {
            display: block;
            width: 26px;
            height: 2.5px;
            background: #1e293b;
            border-radius: 4px;
            transition: 0.3s;
        }
        .hamburger.active span:nth-child(1) {
            transform: rotate(45deg) translate(5px, 5px);
        }
        .hamburger.active span:nth-child(2) {
            opacity: 0;
        }
        .hamburger.active span:nth-child(3) {
            transform: rotate(-45deg) translate(5px, -5px);
        }

        /* ===== 文档主体 ===== */
        .docs-wrapper {
            display: flex;
            margin-top: 80px;
            min-height: calc(100vh - 80px);
            background: transparent;
        }

        /* ===== 侧边栏 ===== */
        .sidebar {
            width: 280px;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-right: 1px solid rgba(0, 0, 0, 0.04);
            padding: 28px 0 40px;
            height: calc(100vh - 80px);
            position: sticky;
            top: 80px;
            overflow-y: auto;
        }
        .sidebar-title {
            font-size: 16px;
            font-weight: 700;
            color: #0f172a;
            padding: 0 24px 16px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.04);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .sidebar-title svg {
            width: 20px;
            height: 20px;
            stroke: #2563eb;
            stroke-width: 2;
            fill: none;
        }
        .sidebar .doc-link {
            display: block;
            padding: 7px 24px 7px 36px;
            color: #475569;
            font-size: 14px;
            font-weight: 500;
            transition: background 0.15s, color 0.15s;
            border-left: 3px solid transparent;
            cursor: pointer;
        }
        .sidebar .doc-link:hover {
            background: rgba(37, 99, 235, 0.06);
            color: #0f172a;
        }
        .sidebar .doc-link.active {
            background: rgba(37, 99, 235, 0.08);
            color: #2563eb;
            border-left-color: #2563eb;
        }
        .sidebar .level-1 {
            padding-left: 52px;
            font-weight: 400;
            font-size: 13px;
            color: #64748b;
        }
        .sidebar .level-2 {
            padding-left: 68px;
            font-weight: 400;
            font-size: 13px;
            color: #94a3b8;
        }

        /* ===== 内容区 ===== */
        .content {
            flex: 1;
            padding: 40px 60px 80px;
            max-width: 960px;
            min-height: calc(100vh - 80px);
            background: transparent;
        }
        .content h1 {
            font-size: 30px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: #0f172a;
            margin-bottom: 14px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.04);
            padding-bottom: 12px;
        }
        .content h2 {
            font-size: 22px;
            font-weight: 600;
            margin-top: 30px;
            margin-bottom: 10px;
            color: #0f172a;
        }
        .content h3 {
            font-size: 18px;
            font-weight: 600;
            margin-top: 22px;
            margin-bottom: 8px;
            color: #1e293b;
        }
        .content p {
            margin-bottom: 14px;
            color: #475569;
        }
        .content ul,
        .content ol {
            margin: 10px 0 18px 24px;
            color: #475569;
        }
        .content li {
            margin-bottom: 6px;
        }
        .content code {
            background: #f1f5f9;
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 0.9em;
            font-family: 'SF Mono', 'Fira Code', monospace;
            color: #1e293b;
        }
        .content pre {
            background: #0f172a;
            border-radius: 12px;
            padding: 18px 22px;
            overflow-x: auto;
            margin: 18px 0;
            color: #cbd5e1;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 13px;
            line-height: 1.8;
        }
        .content pre code {
            background: transparent;
            padding: 0;
            color: inherit;
        }
        .content .block-note {
            background: #e0edff;
            border-left: 4px solid #2563eb;
            padding: 14px 20px;
            border-radius: 8px;
            margin: 18px 0;
        }
        .content .block-warn {
            background: #fef3c7;
            border-left: 4px solid #f59e0b;
            padding: 14px 20px;
            border-radius: 8px;
            margin: 18px 0;
        }
        .content table {
            width: 100%;
            border-collapse: collapse;
            margin: 18px 0;
            font-size: 14px;
        }
        .content table th {
            background: #f1f5f9;
            text-align: left;
            padding: 10px 14px;
            border: 1px solid #e2e8f0;
            font-weight: 600;
            color: #0f172a;
        }
        .content table td {
            padding: 10px 14px;
            border: 1px solid #e2e8f0;
            color: #475569;
        }
        .content .http-method {
            display: inline-block;
            padding: 2px 14px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            margin-right: 10px;
            margin-bottom: 4px;
        }
        .content .http-method.get {
            background: #dbeafe;
            color: #2563eb;
        }
        .content .http-method.post {
            background: #d1fae5;
            color: #059669;
        }
        .content .http-method.put {
            background: #fef3c7;
            color: #d97706;
        }
        .content .http-method.delete {
            background: #fee2e2;
            color: #dc2626;
        }
        .content .path-box {
            background: #f1f5f9;
            border-radius: 8px;
            padding: 10px 18px;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 14px;
            margin: 8px 0 16px;
            display: inline-block;
            border: 1px solid #e2e8f0;
        }
        .loading {
            text-align: center;
            padding: 60px 0;
            color: #94a3b8;
        }
        .loading svg {
            display: block;
            margin: 0 auto 16px;
            width: 40px;
            height: 40px;
            stroke: #2563eb;
            stroke-width: 2;
            fill: none;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        .error-msg {
            color: #dc2626;
            background: #fee2e2;
            padding: 20px 24px;
            border-radius: 12px;
            border-left: 4px solid #dc2626;
        }
        .empty-state {
            text-align: center;
            padding: 80px 0;
            color: #64748b;
        }
        .empty-state svg {
            width: 64px;
            height: 64px;
            stroke: #94a3b8;
            stroke-width: 1.5;
            fill: none;
            margin-bottom: 20px;
        }
        .empty-state h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 12px;
            color: #1e293b;
            border-bottom: none;
        }
        .empty-state p {
            font-size: 18px;
            color: #94a3b8;
        }

        /* ===== 移动端 ===== */
        @media (max-width: 900px) {
            .docs-wrapper {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                top: 0;
                border-right: none;
                border-bottom: 1px solid rgba(0, 0, 0, 0.04);
                padding: 16px 0;
                backdrop-filter: blur(4px);
                max-height: 280px;
                overflow-y: auto;
            }
            .content {
                padding: 24px 20px 60px;
                max-width: 100%;
            }
            .sidebar-title {
                padding: 0 20px 12px;
            }
            .sidebar .doc-link {
                padding: 6px 20px 6px 32px;
            }
            .sidebar .level-1 {
                padding-left: 44px;
            }
            .sidebar .level-2 {
                padding-left: 56px;
            }
            .empty-state {
                padding: 40px 0;
            }
            .empty-state h1 {
                font-size: 24px;
            }
            .empty-state p {
                font-size: 16px;
            }
        }
        @media (max-width: 640px) {
            .nav-links {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 100%;
                left: 0;
                width: 100%;
                background: rgba(255, 255, 255, 0.95);
                padding: 20px 0 28px;
                gap: 16px;
                border-bottom: 1px solid rgba(0, 0, 0, 0.04);
            }
            .nav-links.open {
                display: flex;
            }
            .hamburger {
                display: flex;
            }
            .content h1 {
                font-size: 24px;
            }
            .content h2 {
                font-size: 19px;
            }
            .content {
                padding: 18px 16px 40px;
            }
            .content pre {
                font-size: 12px;
                padding: 14px 16px;
            }
            .content table {
                font-size: 13px;
            }
            .content table th,
            .content table td {
                padding: 6px 10px;
            }
        }
        @media (max-width: 400px) {
            .container {
                padding: 0 16px;
            }
            .sidebar .doc-link {
                font-size: 13px;
                padding: 5px 16px 5px 28px;
            }
            .sidebar .level-1 {
                padding-left: 36px;
            }
        }
    </style>
</head>
<body>

    <div class="glow" id="glow"></div>

    <!-- ===== 导航栏 ===== -->
    <header class="navbar" id="navbar">
        <div class="container">
            <a href="/" class="logo">
                <span class="logo-icon">L</span>
                <span>LeadCore</span>
            </a>
            <ul class="nav-links" id="navLinks">
                <li><a href="/">首页</a></li>
                <li><a href="#" class="active">API 文档</a></li>
            </ul>
            <button class="hamburger" id="hamburger" aria-label="菜单">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </header>

    <!-- ===== 文档主体 ===== -->
    <div class="docs-wrapper">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-title">
                <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16M4 12h10M4 18h6"/></svg>
                API 对接文档
            </div>
        </aside>
        <main class="content" id="content">
            <div class="loading">
                <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2v4M12 22v-4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M22 12h-4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
                加载文档中...
            </div>
        </main>
    </div>

    <script>
        (function() {
            // ===== 光晕 =====
            var glow = document.getElementById('glow');
            document.addEventListener('mousemove', function(e) {
                var x = (e.clientX / window.innerWidth) * 100;
                var y = (e.clientY / window.innerHeight) * 100;
                glow.style.setProperty('--x', x + '%');
                glow.style.setProperty('--y', y + '%');
            });
            document.addEventListener('touchmove', function(e) {
                var touch = e.touches[0];
                if (touch) {
                    var x = (touch.clientX / window.innerWidth) * 100;
                    var y = (touch.clientY / window.innerHeight) * 100;
                    glow.style.setProperty('--x', x + '%');
                    glow.style.setProperty('--y', y + '%');
                }
            }, { passive: true });

            // ===== 汉堡菜单 =====
            var hamburger = document.getElementById('hamburger');
            var navLinks = document.getElementById('navLinks');
            hamburger.addEventListener('click', function() {
                this.classList.toggle('active');
                navLinks.classList.toggle('open');
            });
            document.querySelectorAll('.nav-links a').forEach(function(link) {
                link.addEventListener('click', function() {
                    hamburger.classList.remove('active');
                    navLinks.classList.remove('open');
                });
            });

            // ================================================================
            //  渲染引擎（从根目录 /docx.json 加载数据）
            // ================================================================
            var sidebar = document.getElementById('sidebar');
            var content = document.getElementById('content');

            function isApiNode(node) {
                return node.method && node.path;
            }

            function renderApiDetail(node) {
                var html = '<h1>' + node.title + '</h1>';

                var methodClass = node.method.toLowerCase();
                html += '<div style="display:flex;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:12px;">';
                html += '<span class="http-method ' + methodClass + '">' + node.method + '</span>';
                html += '<span class="path-box">' + node.path + '</span>';
                html += '</div>';

                if (node.params && node.params.length > 0) {
                    html += '<h2>请求参数</h2><table><thead><tr><th>参数名</th><th>类型</th><th>必填</th><th>说明</th></tr></thead><tbody>';
                    node.params.forEach(function(p) {
                        var required = p.required ? '是' : '否';
                        html += '<tr><td><code>' + p.name + '</code></td><td>' + p.type + '</td><td>' +
                            required + '</td><td>' + p.desc + '</td></tr>';
                    });
                    html += '</tbody></table>';
                }

                if (node.response) {
                    html += '<h2>返回结果</h2><pre><code>' + node.response + '</code></pre>';
                }

                if (node.remark) {
                    html += '<div class="block-note"><strong>备注：</strong>' + node.remark + '</div>';
                }

                return html;
            }

            function renderNav(items, level, parentFragment) {
                level = level || 0;
                var frag = parentFragment || document.createDocumentFragment();
                items.forEach(function(item) {
                    var link = document.createElement('a');
                    link.textContent = item.title;
                    link.className = 'doc-link';
                    if (level > 0) link.className += ' level-' + level;
                    link.dataset.id = item.id;

                    link.addEventListener('click', function(e) {
                        e.preventDefault();

                        if (item.content) {
                            content.innerHTML = item.content;
                        } else if (isApiNode(item)) {
                            content.innerHTML = renderApiDetail(item);
                        } else if (item.children) {
                            var first = findFirstLeaf(item.children);
                            if (first) {
                                if (first.content) {
                                    content.innerHTML = first.content;
                                } else if (isApiNode(first)) {
                                    content.innerHTML = renderApiDetail(first);
                                } else {
                                    content.innerHTML = '<h1>' + first.title +
                                        '</h1><p>请从左侧选择具体接口。</p>';
                                }
                            } else {
                                content.innerHTML = '<h1>' + item.title +
                                    '</h1><p>请从左侧选择具体接口。</p>';
                            }
                        } else {
                            content.innerHTML = '<h1>' + item.title +
                                '</h1><p>该节点暂无详细内容。</p>';
                        }

                        document.querySelectorAll('.sidebar .doc-link').forEach(function(a) {
                            a.classList.remove('active');
                        });
                        link.classList.add('active');
                    });

                    frag.appendChild(link);
                    if (item.children) {
                        renderNav(item.children, level + 1, frag);
                    }
                });
                return frag;
            }

            function findFirstLeaf(items) {
                for (var i = 0; i < items.length; i++) {
                    var item = items[i];
                    if (item.content || isApiNode(item)) return item;
                    if (item.children) {
                        var found = findFirstLeaf(item.children);
                        if (found) return found;
                    }
                }
                return null;
            }

            // 显示空状态（API 开发中）
            function showEmptyState() {
                var sidebarContainer = document.getElementById('sidebar');
                var contentContainer = document.getElementById('content');

                // 清空侧边栏，只保留标题
                var title = sidebarContainer.querySelector('.sidebar-title');
                sidebarContainer.innerHTML = '';
                sidebarContainer.appendChild(title);

                // 显示空状态
                contentContainer.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v4M12 22v-4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M22 12h-4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/><circle cx="12" cy="12" r="10"/></svg>
                        <h1>API 正在开发中</h1>
                        <p>当前暂无可用接口文档，敬请期待。</p>
                    </div>
                `;
            }

            // 加载根目录的 docx.json
            function loadDocs() {
                var sidebarContainer = document.getElementById('sidebar');
                var contentContainer = document.getElementById('content');

                fetch('/docx.json')
                    .then(function(res) {
                        if (!res.ok) throw new Error('无法加载 docx.json (HTTP ' + res.status + ')');
                        return res.json();
                    })
                    .then(function(data) {
                        // 如果数据为空或 children 为空，显示空状态
                        if (!data || !data.children || data.children.length === 0) {
                            showEmptyState();
                            return;
                        }

                        // 清空侧边栏（保留标题）
                        var title = sidebarContainer.querySelector('.sidebar-title');
                        sidebarContainer.innerHTML = '';
                        sidebarContainer.appendChild(title);

                        // 渲染导航
                        var navFrag = renderNav(data.children);
                        sidebarContainer.appendChild(navFrag);

                        // 默认展示第一个可显示内容的节点
                        var defaultDoc = findFirstLeaf(data.children);
                        if (defaultDoc) {
                            if (defaultDoc.content) {
                                contentContainer.innerHTML = defaultDoc.content;
                            } else if (isApiNode(defaultDoc)) {
                                contentContainer.innerHTML = renderApiDetail(defaultDoc);
                            }
                            document.querySelectorAll('.sidebar .doc-link').forEach(function(a) {
                                if (a.dataset.id === defaultDoc.id) {
                                    a.classList.add('active');
                                }
                            });
                        } else {
                            // 没有找到可显示节点，也显示空状态
                            showEmptyState();
                        }
                    })
                    .catch(function(err) {
                        // 如果文件不存在或加载失败，也显示“开发中”而不是报错
                        showEmptyState();
                        console.warn('docx.json 加载失败，显示开发中状态:', err);
                    });
            }

            // 启动加载
            loadDocs();

        })();
    </script>

</body>
</html>
